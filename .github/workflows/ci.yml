name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install watchdog deep-translator

      - name: Run Python tests
        run: |
          python -m unittest discover -s tests || echo 'No Python tests found.'

      - name: Run Go tests
        run: |
          if ls *.go 1> /dev/null 2>&1; then go test ./... || echo 'No Go tests found.'; fi

      - name: Generate index.html
        run: |
          python tex_watch.py --once

      - name: Build Go server
        run: |
          go build -o main main.go

      - name: Upload generated HTML as artifact
        uses: actions/upload-artifact@v4
        with:
          name: index-html
          path: index.html

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          keep_files: true
